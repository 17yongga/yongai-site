<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="shadow-sm" x="-4%" y="-4%" width="110%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <filter id="shadow-md" x="-6%" y="-6%" width="114%" height="118%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-lg" x="-8%" y="-8%" width="118%" height="124%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    <filter id="glow-orange" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#C2410C" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="scan-beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C2410C" stop-opacity="0"/>
      <stop offset="30%" stop-color="#C2410C" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#C2410C" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#C2410C" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C2410C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="circuit-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C2410C"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <clipPath id="doc-clip">
      <rect x="0" y="0" width="200" height="260" rx="6"/>
    </clipPath>
  </defs>

  <!-- ==================== LEFT: Document Stack ==================== -->
  <g transform="translate(30, 60)">
    <!-- Document 3 (bottom, furthest back) -->
    <rect x="24" y="16" width="200" height="260" rx="6" fill="#FFFFFF" stroke="rgba(0,0,0,0.08)" stroke-width="1" filter="url(#shadow-sm)"/>

    <!-- Document 2 (middle) -->
    <rect x="12" y="8" width="200" height="260" rx="6" fill="#FFFFFF" stroke="rgba(0,0,0,0.08)" stroke-width="1" filter="url(#shadow-sm)"/>

    <!-- Document 1 (top, front) -->
    <g filter="url(#shadow-md)">
      <rect x="0" y="0" width="200" height="260" rx="6" fill="#FFFFFF" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>

      <!-- Document header area -->
      <rect x="16" y="16" width="100" height="8" rx="2" fill="#1C1C1E" opacity="0.7"/>
      <rect x="16" y="30" width="60" height="5" rx="1.5" fill="#64748B" opacity="0.3"/>

      <!-- Divider line -->
      <line x1="16" y1="42" x2="184" y2="42" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>

      <!-- Text lines with clause highlighting -->
      <!-- Normal line -->
      <rect x="16" y="52" width="168" height="4" rx="1" fill="#64748B" opacity="0.25"/>
      <rect x="16" y="62" width="140" height="4" rx="1" fill="#64748B" opacity="0.25"/>

      <!-- Highlighted clause - amber (review needed) -->
      <rect x="14" y="74" width="174" height="18" rx="3" fill="#B45309" opacity="0.08"/>
      <rect x="16" y="78" width="168" height="4" rx="1" fill="#B45309" opacity="0.5"/>
      <rect x="16" y="86" width="120" height="4" rx="1" fill="#B45309" opacity="0.5"/>
      <!-- Margin annotation - amber triangle -->
      <polygon points="190,78 196,86 184,86" fill="#B45309" opacity="0.6"/>

      <!-- Normal lines -->
      <rect x="16" y="100" width="168" height="4" rx="1" fill="#64748B" opacity="0.25"/>
      <rect x="16" y="110" width="155" height="4" rx="1" fill="#64748B" opacity="0.25"/>
      <rect x="16" y="120" width="168" height="4" rx="1" fill="#64748B" opacity="0.25"/>

      <!-- Highlighted clause - red (high risk) -->
      <rect x="14" y="132" width="174" height="28" rx="3" fill="#DC2626" opacity="0.07"/>
      <rect x="16" y="136" width="168" height="4" rx="1" fill="#DC2626" opacity="0.45"/>
      <rect x="16" y="144" width="150" height="4" rx="1" fill="#DC2626" opacity="0.45"/>
      <rect x="16" y="152" width="90" height="4" rx="1" fill="#DC2626" opacity="0.45"/>
      <!-- Margin annotation - red circle -->
      <circle cx="192" cy="144" r="4" fill="#DC2626" opacity="0.5"/>

      <!-- Normal lines -->
      <rect x="16" y="168" width="168" height="4" rx="1" fill="#64748B" opacity="0.25"/>
      <rect x="16" y="178" width="130" height="4" rx="1" fill="#64748B" opacity="0.25"/>

      <!-- Highlighted clause - green (standard) -->
      <rect x="14" y="188" width="174" height="18" rx="3" fill="#059669" opacity="0.07"/>
      <rect x="16" y="192" width="168" height="4" rx="1" fill="#059669" opacity="0.4"/>
      <rect x="16" y="200" width="100" height="4" rx="1" fill="#059669" opacity="0.4"/>
      <!-- Margin annotation - green circle with check -->
      <circle cx="192" cy="196" r="4" fill="#059669" opacity="0.5"/>

      <!-- More normal lines -->
      <rect x="16" y="214" width="168" height="4" rx="1" fill="#64748B" opacity="0.25"/>
      <rect x="16" y="224" width="145" height="4" rx="1" fill="#64748B" opacity="0.25"/>
      <rect x="16" y="234" width="168" height="4" rx="1" fill="#64748B" opacity="0.25"/>
      <rect x="16" y="244" width="80" height="4" rx="1" fill="#64748B" opacity="0.25"/>
    </g>
  </g>

  <!-- ==================== CENTER: AI Processing ==================== -->
  <g transform="translate(310, 40)">
    <!-- Connection lines from documents to processor -->
    <g stroke="#C2410C" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.3">
      <line x1="-50" y1="170" x2="80" y2="170"/>
      <line x1="-40" y1="140" x2="60" y2="160"/>
      <line x1="-40" y1="200" x2="60" y2="180"/>
    </g>

    <!-- Scanner beam effect -->
    <g transform="translate(-70, 130)">
      <rect x="0" y="0" width="180" height="3" rx="1.5" fill="url(#scan-beam)" filter="url(#glow-orange)"/>
      <!-- Scan line particles -->
      <circle cx="30" cy="1.5" r="2" fill="#C2410C" opacity="0.4"/>
      <circle cx="80" cy="1.5" r="2.5" fill="#C2410C" opacity="0.6"/>
      <circle cx="140" cy="1.5" r="2" fill="#C2410C" opacity="0.3"/>
    </g>

    <!-- AI Processor chip -->
    <g transform="translate(80, 120)">
      <!-- Chip body -->
      <rect x="0" y="0" width="100" height="100" rx="12" fill="url(#circuit-grad)" filter="url(#shadow-lg)"/>

      <!-- Inner chip surface -->
      <rect x="8" y="8" width="84" height="84" rx="8" fill="#1C1C1E" opacity="0.9"/>

      <!-- Circuit traces on chip -->
      <g stroke="#C2410C" stroke-width="1.2" fill="none" opacity="0.7">
        <!-- Horizontal traces -->
        <line x1="20" y1="30" x2="40" y2="30"/>
        <line x1="60" y1="30" x2="80" y2="30"/>
        <line x1="20" y1="50" x2="35" y2="50"/>
        <line x1="65" y1="50" x2="80" y2="50"/>
        <line x1="20" y1="70" x2="40" y2="70"/>
        <line x1="60" y1="70" x2="80" y2="70"/>
        <!-- Vertical traces -->
        <line x1="50" y1="16" x2="50" y2="35"/>
        <line x1="50" y1="65" x2="50" y2="84"/>
        <!-- Center connections -->
        <line x1="40" y1="30" x2="50" y2="40"/>
        <line x1="60" y1="30" x2="50" y2="40"/>
        <line x1="50" y1="60" x2="40" y2="70"/>
        <line x1="50" y1="60" x2="60" y2="70"/>
      </g>

      <!-- Center AI node -->
      <circle cx="50" cy="50" r="10" fill="#C2410C" opacity="0.9"/>
      <circle cx="50" cy="50" r="6" fill="#FFFFFF" opacity="0.15"/>

      <!-- AI text -->
      <text x="50" y="54" text-anchor="middle" fill="#FFFFFF" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="700">AI</text>

      <!-- Pin connectors on edges -->
      <g fill="#C2410C" opacity="0.6">
        <!-- Top pins -->
        <rect x="25" y="-6" width="8" height="8" rx="1"/>
        <rect x="45" y="-6" width="8" height="8" rx="1"/>
        <rect x="65" y="-6" width="8" height="8" rx="1"/>
        <!-- Bottom pins -->
        <rect x="25" y="98" width="8" height="8" rx="1"/>
        <rect x="45" y="98" width="8" height="8" rx="1"/>
        <rect x="65" y="98" width="8" height="8" rx="1"/>
        <!-- Left pins -->
        <rect x="-6" y="25" width="8" height="8" rx="1"/>
        <rect x="-6" y="45" width="8" height="8" rx="1"/>
        <rect x="-6" y="65" width="8" height="8" rx="1"/>
        <!-- Right pins -->
        <rect x="98" y="25" width="8" height="8" rx="1"/>
        <rect x="98" y="45" width="8" height="8" rx="1"/>
        <rect x="98" y="65" width="8" height="8" rx="1"/>
      </g>
    </g>

    <!-- Connection lines from processor to output -->
    <g stroke="#C2410C" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.3">
      <line x1="190" y1="160" x2="280" y2="120"/>
      <line x1="190" y1="170" x2="280" y2="175"/>
      <line x1="190" y1="180" x2="280" y2="230"/>
    </g>

    <!-- Processing label -->
    <text x="130" y="265" text-anchor="middle" fill="#64748B" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="500">Analyzing clauses...</text>

    <!-- Small animated dots (static representation) -->
    <circle cx="220" cy="140" r="2.5" fill="#C2410C" opacity="0.5"/>
    <circle cx="240" cy="155" r="2" fill="#C2410C" opacity="0.35"/>
    <circle cx="255" cy="195" r="2.5" fill="#C2410C" opacity="0.45"/>
  </g>

  <!-- ==================== RIGHT: Analysis Output Panel ==================== -->
  <g transform="translate(600, 40)">
    <!-- Panel background -->
    <rect x="0" y="0" width="268" height="300" rx="10" fill="#FFFFFF" stroke="rgba(0,0,0,0.08)" stroke-width="1" filter="url(#shadow-lg)"/>

    <!-- Panel header -->
    <rect x="0" y="0" width="268" height="44" rx="10" fill="#FAFAF8"/>
    <rect x="0" y="34" width="268" height="10" fill="#FAFAF8"/>
    <line x1="0" y1="44" x2="268" y2="44" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>

    <!-- Header icon -->
    <rect x="16" y="12" width="20" height="20" rx="4" fill="#C2410C" opacity="0.1"/>
    <path d="M22,18 L30,18 M22,22 L28,22 M22,26 L30,26" stroke="#C2410C" stroke-width="1.5" stroke-linecap="round"/>

    <text x="44" y="27" fill="#1C1C1E" font-size="13" font-family="system-ui, -apple-system, sans-serif" font-weight="600">Contract Analysis</text>
    <text x="192" y="27" fill="#64748B" font-size="10" font-family="system-ui, -apple-system, sans-serif">3 findings</text>

    <!-- ===== Finding 1: High Risk ===== -->
    <g transform="translate(16, 58)">
      <rect x="0" y="0" width="236" height="64" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>

      <!-- Red status dot -->
      <circle cx="16" cy="20" r="6" fill="#DC2626"/>
      <circle cx="16" cy="20" r="3" fill="#FFFFFF" opacity="0.3"/>

      <!-- Text -->
      <text x="30" y="16" fill="#DC2626" font-size="9" font-family="system-ui, -apple-system, sans-serif" font-weight="700" letter-spacing="0.5">HIGH RISK</text>
      <text x="30" y="30" fill="#1C1C1E" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="500">Unlimited liability clause</text>
      <text x="30" y="44" fill="#64748B" font-size="10" font-family="system-ui, -apple-system, sans-serif">Section 8.2 — Indemnification</text>

      <!-- Severity bar -->
      <rect x="30" y="52" width="80" height="3" rx="1.5" fill="#FEE2E2"/>
      <rect x="30" y="52" width="72" height="3" rx="1.5" fill="#DC2626" opacity="0.7"/>
    </g>

    <!-- ===== Finding 2: Review Needed ===== -->
    <g transform="translate(16, 134)">
      <rect x="0" y="0" width="236" height="64" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>

      <!-- Amber status dot -->
      <circle cx="16" cy="20" r="6" fill="#B45309"/>
      <circle cx="16" cy="20" r="3" fill="#FFFFFF" opacity="0.3"/>

      <!-- Text -->
      <text x="30" y="16" fill="#B45309" font-size="9" font-family="system-ui, -apple-system, sans-serif" font-weight="700" letter-spacing="0.5">REVIEW NEEDED</text>
      <text x="30" y="30" fill="#1C1C1E" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="500">Non-compete scope unclear</text>
      <text x="30" y="44" fill="#64748B" font-size="10" font-family="system-ui, -apple-system, sans-serif">Section 12.1 — Restrictions</text>

      <!-- Severity bar -->
      <rect x="30" y="52" width="80" height="3" rx="1.5" fill="#FEF3C7"/>
      <rect x="30" y="52" width="52" height="3" rx="1.5" fill="#B45309" opacity="0.7"/>
    </g>

    <!-- ===== Finding 3: Standard ===== -->
    <g transform="translate(16, 210)">
      <rect x="0" y="0" width="236" height="64" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>

      <!-- Green status dot with checkmark -->
      <circle cx="16" cy="20" r="6" fill="#059669"/>
      <path d="M13,20 L15.5,22.5 L19.5,17.5" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Text -->
      <text x="30" y="16" fill="#059669" font-size="9" font-family="system-ui, -apple-system, sans-serif" font-weight="700" letter-spacing="0.5">STANDARD</text>
      <text x="30" y="30" fill="#1C1C1E" font-size="11" font-family="system-ui, -apple-system, sans-serif" font-weight="500">Payment terms 30-day net</text>
      <text x="30" y="44" fill="#64748B" font-size="10" font-family="system-ui, -apple-system, sans-serif">Section 5.1 — Compensation</text>

      <!-- Severity bar (full green = ok) -->
      <rect x="30" y="52" width="80" height="3" rx="1.5" fill="#DCFCE7"/>
      <rect x="30" y="52" width="80" height="3" rx="1.5" fill="#059669" opacity="0.5"/>
    </g>
  </g>

  <!-- ==================== Metric Badge ==================== -->
  <g transform="translate(620, 360)">
    <rect x="0" y="0" width="148" height="38" rx="19" fill="#FFF7ED" stroke="#C2410C" stroke-width="1.5" filter="url(#shadow-sm)"/>

    <!-- Clock icon -->
    <circle cx="22" cy="19" r="8" fill="none" stroke="#C2410C" stroke-width="1.5"/>
    <line x1="22" y1="14" x2="22" y2="19" stroke="#C2410C" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="22" y1="19" x2="26" y2="21" stroke="#C2410C" stroke-width="1.5" stroke-linecap="round"/>

    <text x="38" y="23" fill="#C2410C" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="700">4 hrs/week</text>
    <text x="118" y="23" fill="#64748B" font-size="10" font-family="system-ui, -apple-system, sans-serif">saved</text>
  </g>

  <!-- ==================== Decorative elements ==================== -->
  <!-- Subtle grid dots in background -->
  <g fill="#64748B" opacity="0.06">
    <circle cx="300" cy="380" r="1.5"/>
    <circle cx="320" cy="380" r="1.5"/>
    <circle cx="340" cy="380" r="1.5"/>
    <circle cx="360" cy="380" r="1.5"/>
    <circle cx="380" cy="380" r="1.5"/>
    <circle cx="300" cy="400" r="1.5"/>
    <circle cx="320" cy="400" r="1.5"/>
    <circle cx="340" cy="400" r="1.5"/>
    <circle cx="360" cy="400" r="1.5"/>
    <circle cx="380" cy="400" r="1.5"/>
    <circle cx="400" cy="380" r="1.5"/>
    <circle cx="420" cy="380" r="1.5"/>
    <circle cx="400" cy="400" r="1.5"/>
    <circle cx="420" cy="400" r="1.5"/>
  </g>
</svg>